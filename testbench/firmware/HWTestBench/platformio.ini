[env:esp32-s3-devkitc-1]
platform = espressif32
board = esp32-s3-devkitc-1
framework = arduino
src_dir = .
monitor_speed = 115200
upload_port = COM19
monitor_port = COM19

lib_deps =
    adafruit/Adafruit GFX Library @ ^1.11.11
    adafruit/Adafruit ST7735 and ST7789 Library @ ^1.11.0

build_flags =
    -Wall
    -Wextra
    -Wpedantic
    -DARDUINO_USB_MODE=0
    -DARDUINO_USB_CDC_ON_BOOT=1
    -I../../../include
    -I../../../src
